# 数据源配置 - A股智能选股

# Baostock 数据源（主数据源，稳定免费）
baostock:
  enabled: true
  login_user: "anonymous"
  login_password: "123456"
  # 查询频率限制（毫秒）
  rate_limit_ms: 300

# AKShare 数据源（备选，已弃用）
akshare:
  enabled: false
  timeout: 10

# Tavily 新闻情绪API（可选）
tavily:
  enabled: false  # 需配置 API_KEY
  api_key: ""     # 环境变量 TAVILY_API_KEY
  max_news: 5
  language: "zh"
