# GitHub Pages Configuration
# 站点配置在仓库 Settings → Pages 中设置

title: Stock Picker Plus
description: A股智能选股系统 - 多因子策略 + 三维评分 + 自动推送
author: striferxu
email: striferxu@github.com

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: pretty

# 导航栏
navigation:
  - title: 首页
    url: /
  - title: 文档
    url: /docs/
  - title: GitHub
    url: https://github.com/striferxu/stock-picker-plus

# 主题（可选）
# theme: jekyll-theme-cayman
# remote_theme: pages-themes/cayman@v0.2.0

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# SEO
seo:
  type: Project
  name: Stock Picker Plus
  description: A股量化选股系统，支持多因子策略、三维评分、批量查询

# 排除文件
exclude:
  - "*.py"
  - "*.yml"
  - "*.yaml"
  - "*.toml"
  - "*.json"
  - "node_modules/"
  - "venv/"
  - ".venv/"
  - "data/"
  - "logs/"
  - "reports/"
  - "notebooks/"
  - ".clawhub/"
  - ".openclaw/"
  - "scripts/"
  - "tests/"
  - "core/"
  - "cli/"
  - "output/"
  - "config/"
  - "docs/"  # 排除子目录，只保留docs/index.md

# 只保留docs/index.md作为首页
include:
  - docs/index.md
